<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyTake — Popup Preview</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #1a1209;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #f6efe5;
        display: grid;
        place-items: center;
      }
      .wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        padding: 20px;
      }
      .label {
        font-size: 12px;
        opacity: 0.6;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
      .frame {
        width: 380px;
        height: 680px;
        border: 0;
        border-radius: 14px;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
        background: #fff;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="label">Extension popup preview</div>
      <iframe class="frame" src="popup.html"></iframe>
    </div>
  </body>
</html>
